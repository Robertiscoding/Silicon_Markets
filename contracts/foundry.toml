[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/"
]

fs_permissions = [{ access = "read-write", path = "./deployments" }]

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"
